# HTTP
server {
    # Listen on ipv4
    listen 80;
    # Listen on ipv6.
    # Note: this setting listens on both ipv4 and ipv6 with Nginx release
    #       shipped in some Linux/BSD distributions.
    #listen [::]:80;
    server_name _;

    root /var/www;
    index index.php index.html index.htm;

    location / {
        root /var/www;
    }

#location /status {
        # Turn on nginx stats
#        stub_status on;
#}

#auth_basic "Restricted";
#auth_basic_user_file /var/www/webui/.htpasswd;
    #include /etc/nginx/templates/roundcube.tmpl;
    include /etc/nginx/templates/php-catchall.tmpl;
    include /etc/nginx/templates/https_redirect.tmpl;
    include /etc/nginx/templates/misc.tmpl;


location /webui {

auth_basic "Restricted";
auth_basic_user_file /var/www/webui/.htpasswd;
}

}

# HTTPS
server {
    listen 443 ssl;
    #server_name rc-staging.ubiquitygs.com;
    server_name _;
    #ssl on;
    ssl_certificate /etc/ssl/certs/ubiquity/star_ubiquitygs_com.pem;
    ssl_certificate_key /etc/ssl/certs/ubiquity/star_ubiquitygs_com.key;
    ssl_protocols TLSv1.2;

    # Fix 'The Logjam Attack'.
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-DSS-AES128-GCM-SHA256:kEDH+AESGCM:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA:ECDHE-ECDSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-DSS-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-DSS-AES256-SHA:DHE-RSA-AES256-SHA:ECDHE-RSA-DES-CBC3-SHA:ECDHE-ECDSA-DES-CBC3-SHA:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:AES:CAMELLIA:DES-CBC3-SHA:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK:!aECDH:!EDH-DSS-DES-CBC3-SHA:!EDH-RSA-DES-CBC3-SHA:!KRB5-DES-CBC3-SHA:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_dhparam /etc/ssl/dhparams.pem;

    index index.php index.html index.htm;
    #root /opt/www/roundcubemail-1.5.13;

    # Hide Nginx version number
    server_tokens off;

    gzip on;
    keepalive_timeout 600;
    sendfile on;

    fastcgi_buffers 8 128k;
    fastcgi_buffer_size 128k;
    fastcgi_read_timeout 1000;
    client_max_body_size 32m;
    client_body_timeout 10;
    types_hash_max_size 2048;
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    #    upstream php_workers {
    #        server unix:/var/run/php/php8.3-fpm.sock;
    #    }

    location / {
        root /var/www/;
    }

    location /status {
        access_log off;
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php8.3-fpm.sock;
    }


    # HTTP Strict Transport Security (HSTS)
    include /etc/nginx/templates/hsts.tmpl;

    # Web applications.
    # PHP applications. WARNING: php-catchall.tmpl should be loaded after
    # other php web applications.
    include /etc/nginx/templates/roundcube.tmpl;
    include /etc/nginx/templates/php-catchall.tmpl;
    include /etc/nginx/templates/misc.tmpl;
}
